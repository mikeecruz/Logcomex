services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: pokeagenda-app
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - pokeagenda

  nginx:
    image: nginx:1.27-alpine
    container_name: pokeagenda-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - pokeagenda

  db:
    image: mysql:8.4
    container_name: pokeagenda-db
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pokeagenda

networks:
  pokeagenda:

volumes:
  dbdata:
